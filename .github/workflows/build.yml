name: Flutter APK Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. تثبيت أحدث Flutter stable (بدون تثبيت رقم قديم)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. عرض البيئة (تشخيص)
      - name: Show environment
        run: |
          flutter --version
          dart --version
          pwd
          ls -R

      # 4. تنظيف المشروع
      - name: Clean project
        run: flutter clean

      # 5. تحديث dependencies بالقوة (مهم جدًا لحل المشكلة)
      - name: Force pub upgrade
        run: flutter pub upgrade --major-versions

      # 6. تحميل الحزم
      - name: Install dependencies
        run: flutter pub get

      # 7. تحليل المشروع
      - name: Analyze project
        run: flutter analyze || true

      # 8. بناء APK
      - name: Build APK
        run: flutter build apk --release --verbose

      # 9. رفع APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk