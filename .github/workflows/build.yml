name: Flutter APK Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. تثبيت Flutter نسخة ثابتة (مهم جدًا)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # 3. عرض معلومات النظام (للتشخيص)
      - name: Show environment
        run: |
          flutter --version
          dart --version
          pwd
          ls -R

      # 4. تنظيف المشروع
      - name: Clean project
        run: flutter clean

      # 5. تحميل الحزم
      - name: Install dependencies
        run: flutter pub get

      # 6. فحص أخطاء المشروع (مهم)
      - name: Analyze project
        run: flutter analyze || true

      # 7. بناء APK
      - name: Build APK
        run: flutter build apk --release --verbose

      # 8. رفع الناتج
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk